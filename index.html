<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Riftbound — Point Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fff;
    --fg: #000;
    --bg2: #eee;
    --border: #000;
    --border-dim: #ddd;
    --text-dim: #444;
    --text-faint: #bbb;
    --text-empty: #bbb;
    --history-active: #fee;
  }

  body.dark {
    --bg: #111;
    --fg: #fff;
    --bg2: #222;
    --border: #fff;
    --border-dim: #444;
    --text-dim: #bbb;
    --text-faint: #555;
    --text-empty: #555;
    --history-active: #311;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, sans-serif;
    height: 100dvh;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 6px;
  }

  .header h1 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .header-controls {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .hbtn {
    background: none;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    height: 26px;
  }
  .hbtn svg { display: block; }
  .hbtn:active { background: var(--fg); color: var(--bg); }
  .hbtn.active { background: var(--fg); color: var(--bg); }

  /* ── PLAYERS GRID ── */
  .players {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
    border-top: none;
  }

  .player {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .player:first-child { border-right: 1px solid var(--border); }

  /* ── CHAMPION PORTRAIT ── */
  .champion-frame {
    position: relative;
    width: 100%;
    height: 60px;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
  }

  .champion-img-wrap {
    position: relative;
    width: 60px;
    height: 60px;
    flex-shrink: 0;
    overflow: hidden;
    cursor: pointer;
  }

  .champion-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .champion-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 45%);
    pointer-events: none;
  }

  .champion-name {
    position: absolute;
    bottom: 3px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    text-transform: uppercase;
    padding: 0 2px;
    pointer-events: none;
  }

  .champion-arrows {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex: 1;
    padding: 0 8px;
  }

  .champion-arrow {
    flex: 1;
    height: 60px;
    background: var(--bg);
    border: none;
    border-left: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg);
    font-size: 1.4rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .champion-arrow:first-child { border-left: none; border-right: 1px solid var(--border); }
  .champion-arrow:active { background: var(--fg); color: var(--bg); }

  /* ── MIDDLE ── */
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 6px 4px;
    gap: 6px;
    overflow: hidden;
    min-height: 0;
  }

  .score-number {
    font-size: clamp(6rem, 26vw, 11rem);
    font-weight: 900;
    line-height: 1;
    color: var(--fg);
    flex-shrink: 0;
    transition: transform 0.12s;
    padding: 10px 0;
  }
  .score-number.bump { transform: scale(1.18); }

  /* ── HISTORY ── */
  .history-panel {
    width: 100%;
    flex: 1;
    overflow-y: auto;
    border-top: 1px solid var(--border-dim);
    padding-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-height: 0;
  }

  .history-empty {
    font-size: 0.6rem;
    color: var(--text-faint);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 0;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 2px;
    border-radius: 2px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .history-item:active { background: var(--history-active); }

  .history-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .history-dot.conq { background: #000; }
  .history-dot.hold { background: #666; }
  .history-dot.other { background: #aaa; }

  .history-text {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-undo {
    font-size: 0.75rem;
    color: var(--text-faint);
    flex-shrink: 0;
  }

  /* ── BUTTONS ── */
  .action-buttons {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px 6px;
    background: var(--bg);
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--fg);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:last-child { border-bottom: none; }
  .btn:active { background: var(--fg); color: var(--bg); }
  .btn-main {
    padding: 28px 6px;
    font-size: 1.1rem;
  }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    width: 100%;
    max-width: 300px;
  }

  .modal h2 {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    text-align: center;
  }

  .modal p {
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 16px;
    color: var(--text-dim);
    text-align: center;
  }
  .modal p span { font-weight: 700; color: var(--fg); }

  .modal-buttons { display: flex; gap: 8px; }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    background: var(--bg);
    color: var(--fg);
    -webkit-tap-highlight-color: transparent;
  }
  .modal-btn:active { background: var(--fg); color: var(--bg); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--fg);
    color: var(--bg);
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>RiftCounter</h1>
    <div class="header-controls">
      <button class="hbtn" id="btn-bo" onclick="cycleBo()">Bo1</button>
      <button class="hbtn" id="btn-aspirant" onclick="cycleAspirant()">Aspirant: 0</button>
      <button class="hbtn" id="btn-theme" onclick="toggleTheme()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button class="hbtn" onclick="promptReset()">Reset</button>
    </div>
  </div>
  <div class="players" id="players-grid"></div>
</div>

<!-- Modal: Geez -->
<div class="modal-overlay" id="modal-geez">
  <div class="modal" style="max-width: 280px;">
    <h2>GG EZ</h2>
    <p>That's enough points to win.</p>
    <div class="modal-buttons">
      <button class="modal-btn" onclick="closeModal('modal-geez')">Well Played</button>
    </div>
  </div>
</div>

<!-- Modal: Delete last point -->
<div class="modal-overlay" id="modal-delete">
  <div class="modal">
    <p id="modal-delete-text">Delete last point scored?</p>
    <div class="modal-buttons">
      <button class="modal-btn" onclick="closeModal('modal-delete')">Cancel</button>
      <button class="modal-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Modal: Reset game -->
<div class="modal-overlay" id="modal-reset">
  <div class="modal">
    <h2>Reset Game</h2>
    <p>Clear all points and history for <span>both players</span>? Champion selections will be kept.</p>
    <div class="modal-buttons">
      <button class="modal-btn" onclick="closeModal('modal-reset')">Cancel</button>
      <button class="modal-btn" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DD_VERSION = '15.1.1';
const DD_BASE = `https://ddragon.leagueoflegends.com/cdn/${DD_VERSION}/img/champion`;

const CHAMPIONS = [
  { name: "Ahri",         key: "Ahri" },
  { name: "Annie",        key: "Annie" },
  { name: "Azir",         key: "Azir" },
  { name: "Caitlyn",      key: "Caitlyn" },
  { name: "Darius",       key: "Darius" },
  { name: "Draven",       key: "Draven" },
  { name: "Ezreal",       key: "Ezreal" },
  { name: "Fiora",        key: "Fiora" },
  { name: "Garen",        key: "Garen" },
  { name: "Heimerdinger", key: "Heimerdinger" },
  { name: "Irelia",       key: "Irelia" },
  { name: "Jax",          key: "Jax" },
  { name: "Jinx",         key: "Jinx" },
  { name: "Kai'Sa",       key: "Kaisa" },
  { name: "Lee Sin",      key: "LeeSin" },
  { name: "Lucian",       key: "Lucian" },
  { name: "Lux",          key: "Lux" },
  { name: "Master Yi",    key: "MasterYi" },
  { name: "Ornn",         key: "Ornn" },
  { name: "Rek'Sai",      key: "RekSai" },
  { name: "Renata Glasc", key: "Renata" },
  { name: "Rumble",       key: "Rumble" },
  { name: "Sett",         key: "Sett" },
  { name: "Sivir",        key: "Sivir" },
  { name: "Teemo",        key: "Teemo" },
  { name: "Vi",           key: "Vi" },
  { name: "Vex",          key: "Vex" },
  { name: "Viktor",       key: "Viktor" },
  { name: "Volibear",     key: "Volibear" },
  { name: "Warwick",      key: "Warwick" },
  { name: "Yasuo",        key: "Yasuo" },
];

const STORAGE_KEY = 'riftbound_tracker_v3';
const BASE_MAX = 8;

// Settings (persisted separately)
let settings = { aspirant: 0, bo: 1 }; // aspirant: 0/1/2, bo: 1/3

function maxPoints() { return BASE_MAX + settings.aspirant; }

function loadSettings() {
  try {
    const raw = localStorage.getItem('riftbound_settings');
    if (raw) settings = { ...settings, ...JSON.parse(raw) };
  } catch(e) {}
}

function saveSettings() {
  try { localStorage.setItem('riftbound_settings', JSON.stringify(settings)); } catch(e) {}
}

function toggleTheme() {
  settings.dark = !settings.dark;
  applyTheme();
  saveSettings();
}

function applyTheme() {
  document.body.classList.toggle('dark', !!settings.dark);
  const btn = document.getElementById('btn-theme');
  if (btn) btn.innerHTML = settings.dark
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
}

function cycleAspirant() {
  settings.aspirant = (settings.aspirant + 1) % 3;
  saveSettings();
  updateHeaderButtons();
}

function cycleBo() {
  settings.bo = settings.bo === 1 ? 3 : 1;
  saveSettings();
  updateHeaderButtons();
}

function updateHeaderButtons() {
  const aspirantLabels = ['Aspirant: 0', 'Aspirant: 1', 'Aspirant: 2'];
  const ab = document.getElementById('btn-aspirant');
  if (ab) {
    ab.textContent = aspirantLabels[settings.aspirant];
    ab.classList.toggle('active', settings.aspirant > 0);
  }
  const bb = document.getElementById('btn-bo');
  if (bb) {
    bb.textContent = `Bo${settings.bo}`;
    bb.classList.toggle('active', settings.bo === 3);
  }
}

function defaultState() {
  return { players: [
    { champIndex: 0, score: 0, history: [] },
    { champIndex: 1, score: 0, history: [] },
  ]};
}

let state = defaultState();
let pendingDeletePlayer = null;
let saveTimeout = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      if (loaded.players?.length === 2) state = loaded;
    }
  } catch(e) {}
}

function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }, 300);
}

function render() {
  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';

  state.players.forEach((player, pi) => {
    const champ = CHAMPIONS[player.champIndex];
    const col = document.createElement('div');
    col.className = 'player';

    // Champion portrait
    const frame = document.createElement('div');
    frame.className = 'champion-frame';
    frame.innerHTML = `
      <div class="champion-arrow" onclick="cycleChamp(${pi},-1)">&#8249;</div>
      <div class="champion-img-wrap" onclick="cycleChamp(${pi}, 1)">
        <img class="champion-img" src="${DD_BASE}/${champ.key}.png" alt="${champ.name}" onerror="this.style.opacity='0'">
        <div class="champion-overlay"></div>
        <div class="champion-name">${champ.name}</div>
      </div>
      <div class="champion-arrow" onclick="cycleChamp(${pi},1)">&#8250;</div>
    `;
    col.appendChild(frame);

    // Middle: score + history
    const middle = document.createElement('div');
    middle.className = 'middle';

    const scoreEl = document.createElement('div');
    scoreEl.className = 'score-number';
    scoreEl.id = `score-${pi}`;
    scoreEl.textContent = player.score;
    middle.appendChild(scoreEl);

    const hist = document.createElement('div');
    hist.className = 'history-panel';
    if (player.history.length === 0) {
      hist.innerHTML = `<div class="history-empty">No points yet</div>`;
    } else {
      [...player.history].reverse().forEach((item, ri) => {
        const realIndex = player.history.length - 1 - ri;
        const isLast = realIndex === player.history.length - 1;
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `
          <div class="history-dot ${item.type}"></div>
          <div class="history-text">${item.label} ${realIndex + 1}</div>
          ${isLast ? '<div class="history-undo">↩ undo</div>' : ''}
        `;
        if (isLast) el.addEventListener('click', () => promptDelete(pi));
        hist.appendChild(el);
      });
    }
    middle.appendChild(hist);
    col.appendChild(middle);

    // Buttons
    const btns = document.createElement('div');
    btns.className = 'action-buttons';
    btns.innerHTML = `
      <button class="btn btn-main" style="border-bottom: none;" onclick="addPoint(${pi},'conq','Conquer')">Conquer</button>
      <div style="display:flex; align-items: stretch; border-top: 1px solid var(--border);">
        <button class="btn btn-main" style="flex: 7; border-right: 1px solid var(--border); border-top: none; border-bottom: none;" onclick="addPoint(${pi},'hold','Hold')">Hold</button>
        <button class="btn btn-main" style="flex: 3; border-top: none; border-bottom: none;" onclick="addPoint(${pi},'other','Other')">Other</button>
      </div>
    `;
    col.appendChild(btns);

    grid.appendChild(col);
  });
}

function cycleChamp(pi, dir) {
  state.players[pi].champIndex = (state.players[pi].champIndex + dir + CHAMPIONS.length) % CHAMPIONS.length;
  saveState(); render();
}

function addPoint(pi, type, label) {
  const p = state.players[pi];
  if (p.score >= maxPoints()) {
    openModal('modal-geez');
    return;
  }
  p.score++;
  p.history.push({ type, label });
  saveState(); render();
  const el = document.getElementById(`score-${pi}`);
  if (el) { el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 150); }
}

function promptDelete(pi) {
  if (!state.players[pi].history.length) return;
  pendingDeletePlayer = pi;
  const last = state.players[pi].history[state.players[pi].history.length - 1];
  document.getElementById('modal-delete-text').innerHTML = `Delete last point? (<span>${last.label}</span>)`;
  openModal('modal-delete');
}

function confirmDelete() {
  const p = state.players[pendingDeletePlayer];
  if (p.history.length > 0) {
    p.history.pop();
    p.score = Math.max(0, p.score - 1);
    saveState(); render();
    showToast('Point removed');
  }
  closeModal('modal-delete');
}

function promptReset() { openModal('modal-reset'); }

function confirmReset() {
  state.players.forEach(p => { p.score = 0; p.history = []; });
  saveState(); render();
  closeModal('modal-reset');
  showToast('Game reset');
}

function openModal(id) { document.getElementById(id).classList.add('visible'); }
function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('visible'); });
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

loadSettings();
loadState();
render();
updateHeaderButtons();
applyTheme();

// ── WAKE LOCK ──
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();
</script>
</body>
</html>
